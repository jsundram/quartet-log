<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quartet Log</title>

    <!-- Use `ngrok http http://0.0.0.0:8000` to test on mobile without deploying -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=.75">


    <!-- Use RealFaviconGenerator for the following-->
    <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="mask-icon" href="./safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">

    <!-- Pre-paint theme application. Reads localStorage and sets data-theme
         on <html> before CSS resolves, so light/dark overrides don't flash.
         Kept inline + synchronous on purpose; runtime source of truth is
         src/themeManager.js after the bundle loads. -->
    <script>
    (function () {
        try {
            var t = localStorage.getItem('theme');
            if (t === 'light' || t === 'dark') {
                document.documentElement.setAttribute('data-theme', t);
            }
        } catch (e) { /* localStorage blocked: fall through to auto */ }
    })();
    </script>

    <script src="./d3.v7.min.js"></script>
    <link rel="stylesheet" type="text/css" href="./viz.css">
</head>
<body>
    <div id="menu">
        <div class="hamburger-menu">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="menu-items">
            <a href="#" class="menu-item" data-view="main">Home</a>
            <a href="#" class="menu-item" data-view="calendar">Calendar</a>
            <a href="#" class="menu-item" data-view="dashboard">Dashboard</a>
            <a href="about.html" class="menu-item" data-view="about">About</a>
            <a href="#" class="menu-item menu-item--action" data-view="theme">
                <svg class="menu-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
                <span data-theme-label>Theme: Auto</span>
            </a>
            <a href="#" class="menu-item menu-item--action" data-view="download-csv">
                <svg class="menu-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Download Data</span>
            </a>
            <a href="#" class="menu-item menu-item--action menu-item--destructive" data-view="logout">
                <svg class="menu-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Log Out</span>
            </a>
        </div>
    </div>

    <div id="mainContent" style="display: block">
        <h1 style="text-align: center">Quartet Log</h1>
        <div id="dateSlider"></div>
        <div id="radioButtons">
            <div class="player-filter">
                <label class="player-filter-label">Player:</label>
                <div id="playerSelect" class="player-multiselect">
                    <div class="player-select-trigger">ANY</div>
                    <div class="player-dropdown"></div>
                </div>
            </div>
        </div>
        <div id="tabs"></div>
        <div id="tabContent"></div>
        <div class="tooltip" id="tooltip"></div>
    </div>

    <div id="calendar" style="display: none">
        <h1 style="text-align: center">Quartet Days</h1>
        <div class="tooltip" id="daytooltip"></div>

        <!-- Calendar will be rendered here -->
    </div>

    <div id="dashboard" style="display: none">
        <h1 style="text-align: center">Dashboard</h1>
        <div id="dashboardDateFilter"></div>
        <div class="dashboard-charts">
            <section class="dashboard-section">
                <h2 class="dashboard-chart-title">Parts played</h2>
                <div id="dashboardPartBar"></div>
            </section>
            <section class="dashboard-section">
                <h2 class="dashboard-chart-title">Top composers</h2>
                <div id="dashboardComposerChart"></div>
            </section>
        </div>
    </div>

    <div id="update"></div>

    <div id="setupView" style="display: none">
        <div class="setup-container">
            <h1>Quartet Log Setup</h1>
            <p>Enter the URL of your Google Sheets data (published as CSV).</p>
            <form id="setupForm">
                <input type="url" id="dataUrlInput" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" autocomplete="off">
                <div id="setupError" class="setup-error"></div>
                <button type="submit">Load Data</button>
                <button type="button" id="copyMobileLink" class="setup-secondary"
                        title="Generates a link that pre-configures the app on another device, so you don't have to retype this URL on your phone. Send the copied link to yourself via AirDrop, iMessage, email, etc.">
                    Copy mobile setup link
                </button>
            </form>
            <p class="setup-help">Need help? <a href="setup.html">Learn how to publish your Google Sheet</a></p>
        </div>
    </div>

<script src="./bundle.js"></script>
</body>
</html>
